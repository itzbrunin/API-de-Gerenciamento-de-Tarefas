services:
  - type: web
    name: task-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: task-api-db
          property: connectionString

databases:
  - name: task-api-db
    plan: free
    databaseName: task_api
    user: task_api_user